apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-static-server
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: edge-static-server
    app.kubernetes.io/part-of: traefik-edge-cutover
data:
  server.py: |
    import mimetypes
    import os
    import re
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from pathlib import Path
    from urllib.parse import unquote, urlparse

    # cv.e-dani.com / cv-manu.e-dani.com migrados al app dedicado 'cv' (k8s).
    HOST_ROOTS = {}

    PREFIX_ROOTS = {
        ("skirmshop.e-dani.com", "/files/"): ("/srv/skirmshop-files", False),
        ("synapse.e-dani.com", "/attachments/"): ("/srv/synapse-email-attachments", False),
    }

    OPENCLAW_IMAGES_HOST = "images.openclaw.e-dani.com"
    OPENCLAW_IMAGES_ROOT = "/srv/openclaw-images"
    OPENCLAW_IMAGE_PATH = re.compile(r"^/(ephemeral|permanent)/[0-9a-f]{32}\.(png|jpe?g|webp)$")

    def safe_join(root, rel):
        root_path = Path(root).resolve()
        candidate = (root_path / rel.lstrip("/")).resolve()
        if not str(candidate).startswith(str(root_path)):
            return None
        return candidate

    class Handler(BaseHTTPRequestHandler):
        def do_HEAD(self):
            self._serve(head_only=True)

        def do_GET(self):
            self._serve(head_only=False)

        def _serve(self, head_only=False):
            host = self.headers.get("Host", "").split(":")[0]
            path = unquote(urlparse(self.path).path)

            root = None
            spa = False
            rel = path
            is_openclaw_image = False

            if host == OPENCLAW_IMAGES_HOST:
                if not OPENCLAW_IMAGE_PATH.match(path):
                    self.send_error(404)
                    return
                root = OPENCLAW_IMAGES_ROOT
                rel = path
                is_openclaw_image = True

            for (prefix_host, prefix), mapping in PREFIX_ROOTS.items():
                if root is None and host == prefix_host and path.startswith(prefix):
                    root, spa = mapping
                    rel = path[len(prefix):]
                    break

            if root is None and host in HOST_ROOTS:
                root, spa = HOST_ROOTS[host]

            if root is None:
                self.send_error(404)
                return

            target = safe_join(root, rel)
            if target is None:
                self.send_error(403)
                return

            if target.is_dir():
                target = target / "index.html"

            if not target.exists() and spa:
                target = Path(root) / "index.html"

            if not target.exists() or not target.is_file():
                self.send_error(404)
                return

            content_type = mimetypes.guess_type(str(target))[0] or "application/octet-stream"
            self.send_response(200)
            self.send_header("Content-Type", content_type)
            self.send_header("Content-Length", str(target.stat().st_size))
            if is_openclaw_image:
                self.send_header("Cache-Control", "private, max-age=86400")
                self.send_header("Content-Disposition", "inline")
            elif target.suffix in {".css", ".js", ".png", ".jpg", ".jpeg", ".gif", ".webp", ".svg", ".ico", ".woff", ".woff2", ".pdf"}:
                self.send_header("Cache-Control", "public, max-age=2592000")
            else:
                self.send_header("Cache-Control", "public, max-age=300")
            self.end_headers()

            if not head_only:
                try:
                    with target.open("rb") as fh:
                        self.wfile.write(fh.read())
                except (BrokenPipeError, ConnectionResetError):
                    pass

        def log_message(self, fmt, *args):
            return

    ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-static-server
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: edge-static-server
    app.kubernetes.io/part-of: traefik-edge-cutover
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-static-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-static-server
        app.kubernetes.io/part-of: traefik-edge-cutover
    spec:
      nodeSelector:
        role: edge
        topology: remote
      tolerations:
        - key: role
          operator: Equal
          value: edge
          effect: NoSchedule
      containers:
        - name: static
          image: docker.io/library/python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: app, mountPath: /app, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: skirmshop-files, mountPath: /srv/skirmshop-files, readOnly: true }
            - { name: synapse-email-attachments, mountPath: /srv/synapse-email-attachments, readOnly: true }
            - { name: openclaw-images, mountPath: /srv/openclaw-images, readOnly: true }
      volumes:
        - name: app
          configMap:
            name: edge-static-server
        - name: tmp
          emptyDir: {}
        - name: skirmshop-files
          hostPath: { path: /var/www/skirmshop-files, type: Directory }
        - name: synapse-email-attachments
          hostPath: { path: /var/lib/synapse/email-attachments, type: DirectoryOrCreate }
        - name: openclaw-images
          hostPath: { path: /var/lib/openclaw-images, type: Directory }
---
apiVersion: v1
kind: Service
metadata:
  name: edge-static-server
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: edge-static-server
    app.kubernetes.io/part-of: traefik-edge-cutover
spec:
  selector:
    app.kubernetes.io/name: edge-static-server
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: openclaw-images-auth
  namespace: traefik-edge
spec:
  basicAuth:
    secret: openclaw-images-basic-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-oracle
  namespace: traefik-edge
spec:
  stripPrefix:
    prefixes:
      - /api/oracle
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-static-public
  namespace: traefik-edge
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    # cv.e-dani.com and cv-manu.e-dani.com are now served by the dedicated 'cv'
    # app (repo k8s-cv-pocharlies): cv-dani / cv-manu nginx + cv-oracle, with
    # their IngressRoutes in the cv namespace (added to traefik-edge's watched
    # namespaces in values.yaml). Removed from edge-static-server on 2026-05-24.
    - kind: Rule
      match: Host(`skirmshop.e-dani.com`) && PathPrefix(`/files`)
      priority: 2000
      services:
        - name: edge-static-server
          port: 8080
    - kind: Rule
      match: Host(`synapse.e-dani.com`) && PathPrefix(`/attachments`)
      priority: 2000
      middlewares:
        - name: synapse-admin-allowlist
      services:
        - name: edge-static-server
          port: 8080
  tls:
    store:
      name: default
      namespace: traefik-edge
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-openclaw-images
  namespace: traefik-edge
  annotations:
    external-dns.alpha.kubernetes.io/hostname: images.openclaw.e-dani.com
    external-dns.alpha.kubernetes.io/target: "sauvage.e-dani.com"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    - kind: Rule
      match: Host(`images.openclaw.e-dani.com`)
      middlewares:
        - name: openclaw-images-auth
      services:
        - name: edge-static-server
          port: 8080
  tls:
    secretName: images-openclaw-tls
