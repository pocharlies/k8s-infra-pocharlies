---
# Harbor public IngressRoute — allows external access to harbor.e-dani.com
# Used by GitHub Actions CI/CD to push images from GitHub-hosted runners.
# Auth: Harbor robot account credentials stored as GitHub secrets (not embedded here).
# TLS: wildcard *.e-dani.com cert from cert-manager (wildcard-public-tls)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: harbor-public
  namespace: traefik-edge
  annotations:
    external-dns.alpha.kubernetes.io/hostname: harbor.e-dani.com
    external-dns.alpha.kubernetes.io/target: "sauvage.e-dani.com"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    - kind: Rule
      match: Host(`harbor.e-dani.com`)
      services:
        - name: harbor
          namespace: harbor
          port: 80
  tls:
    secretName: wildcard-public-tls
