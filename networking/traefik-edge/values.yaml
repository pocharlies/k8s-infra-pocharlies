# Traefik EDGE — public ingress on KS-5 HA + sauvage
# Helm chart: traefik/traefik
# Deployed as DaemonSet with hostNetwork on nodes labeled ingress=true.
# TLS termination via cert-manager wildcard *.e-dani.com (DNS-01 Cloudflare).
# Traffic flow: Internet → Cloudflare Multi-A → Traefik EDGE → cluster services.
#
# Cutover completed 2026-05-22: NGINX stopped, Traefik binds 80/443.

deployment:
  kind: DaemonSet
  dnsPolicy: ClusterFirstWithHostNet

# Run on ks5-cp-1..3 and sauvage after the KS-5 HA rollout.
nodeSelector:
  ingress: "true"

tolerations:
  - key: role
    operator: Equal
    value: edge
    effect: NoSchedule
  - key: pocharlies.io/pool
    operator: Equal
    value: bulk
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# hostNetwork: bind directly to each public edge IP.
hostNetwork: true

# Use separate IngressClass from LAN Traefik
ingressClass:
  name: traefik-edge
  enabled: true
  isDefaultClass: false

# Entrypoints
ports:
  web:
    port: 80
    exposedPort: 80
    protocol: TCP
    expose:
      default: true
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 443
    exposedPort: 443
    protocol: TCP
    expose:
      default: true
    http:
      tls:
        enabled: true
  traefik:
    port: 9080
    expose:
      default: false
  metrics:
    port: 9901
    expose:
      default: false
  # Tesla Fleet Telemetry — TCP passthrough on 4444
  # Tesla backend servers connect here to push vehicle telemetry.
  # IngressRouteTCP in fleet-telemetry namespace handles routing.
  fleet-telemetry:
    port: 4444
    exposedPort: 4444
    protocol: TCP

# No LoadBalancer service needed — hostNetwork binds directly
service:
  enabled: false

# Traefik dashboard (internal access only, not exposed publicly)
ingressRoute:
  dashboard:
    enabled: false

# Plugins / middleware
additionalArguments:
  - "--log.level=INFO"
  - "--accesslog=true"
  - "--metrics.prometheus=true"
  - "--metrics.prometheus.entrypoint=metrics"
  - "--ping=true"
  - "--ping.entryPoint=traefik"

providers:
  kubernetesCRD:
    ingressClass: traefik-edge
    namespaces:
      - traefik-edge
      - skirmshop
      - whatsapp-mcp
      - litellm
      - n8n
      - harbor
      - skirmshop-brain-prod
      - cv
      - homeassistant
      - teslamate
      - jarvis
      - keycloak
    allowCrossNamespace: true
    allowExternalNameServices: true
    allowEmptyServices: true
  kubernetesIngress:
    ingressClass: traefik-edge
    namespaces:
      - traefik-edge
      - skirmshop
      - whatsapp-mcp
      - litellm
      - n8n
      - harbor
      - skirmshop-brain-prod
      - cv
      - homeassistant
      - teslamate
      - jarvis
      - keycloak
    allowExternalNameServices: true
    allowEmptyServices: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
    add: ["NET_BIND_SERVICE"]

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

# RBAC: needs ClusterRole to watch IngressRoutes across all namespaces
rbac:
  enabled: true

# cert-manager TLS integration (certificates stored in traefik-edge ns)
persistence:
  enabled: false   # cert-manager manages TLS secrets
