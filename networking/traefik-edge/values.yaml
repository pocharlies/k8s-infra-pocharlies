# Traefik EDGE — public ingress on sauvage (57.129.17.172)
# Helm chart: traefik/traefik
# Deployed as DaemonSet with hostNetwork on sauvage nodes only.
# TLS termination via cert-manager wildcard *.e-dani.com (DNS-01 Cloudflare).
# Traffic flow: Internet → sauvage:443 → Traefik EDGE → cluster services (via flannel-WG overlay)
#
# IMPORTANT: Before enabling, ensure NGINX legacy on sauvage releases ports 80/443.
# Strategy: run Traefik EDGE on 8080/8443 with NGINX as proxy, then cutover.

deployment:
  kind: DaemonSet

# Pin to sauvage nodes only
nodeSelector:
  topology: remote
  role: edge

tolerations:
  - key: role
    operator: Equal
    value: edge
    effect: NoSchedule

# hostNetwork: bind directly to sauvage IP 57.129.17.172
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

# Use separate IngressClass from LAN Traefik
ingressClass:
  name: traefik-edge
  enabled: true
  isDefaultClass: false

# Entrypoints
ports:
  web:
    port: 80
    exposedPort: 80
    redirectTo:
      port: websecure
  websecure:
    port: 443
    exposedPort: 443
    tls:
      enabled: true
  # Tesla Fleet Telemetry — TCP passthrough on 4444
  # Tesla backend servers connect here to push vehicle telemetry.
  # IngressRouteTCP in fleet-telemetry namespace handles routing.
  fleet-telemetry:
    port: 4444
    exposedPort: 4444
    protocol: TCP

# No LoadBalancer service needed — hostNetwork binds directly
service:
  enabled: false

# Traefik dashboard (internal access only, not exposed publicly)
ingressRoute:
  dashboard:
    enabled: false

# Plugins / middleware
additionalArguments:
  - "--providers.kubernetesingress=false"
  - "--providers.kubernetescrd=true"
  - "--providers.kubernetesingress.ingressclass=traefik-edge"
  - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
  - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
  - "--log.level=INFO"
  - "--accesslog=true"
  - "--metrics.prometheus=true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

# RBAC: needs ClusterRole to watch IngressRoutes across all namespaces
rbac:
  enabled: true

# cert-manager TLS integration (certificates stored in traefik-edge ns)
persistence:
  enabled: false   # cert-manager manages TLS secrets
