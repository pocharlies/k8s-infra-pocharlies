---
# Public ingress for the Shopify Affiliate app (migrated to k8s).
#   affiliate.skirmshop.es = afiliados portal + embedded admin
#   go.skirmshop.es        = link redirector / click tracking
# Both hostnames are Cloudflare-proxied (origin firewall only admits Cloudflare IPs).
# TLS: cert-manager Certificate `affiliate-skirmshop-tls` (DNS-01, skirmshop.es zone).
# external-dns publishes the proxied records (target = sauvage public IP).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-affiliate-public
  namespace: traefik-edge
  annotations:
    external-dns.alpha.kubernetes.io/hostname: affiliate.skirmshop.es,go.skirmshop.es
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    - kind: Rule
      match: Host(`affiliate.skirmshop.es`) || Host(`go.skirmshop.es`)
      services:
        - name: affiliate-app
          namespace: skirmshop
          port: 80
  tls:
    secretName: affiliate-skirmshop-tls
