---
# Wildcard certificate for all public domains: *.e-dani.com
# Used by Traefik EDGE for TLS termination on sauvage
# cert-manager DNS-01 via Cloudflare (same issuer as LAN wildcard)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-public-tls
  namespace: traefik-edge
spec:
  secretName: wildcard-public-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.e-dani.com"
  dnsNames:
    - "*.e-dani.com"
    - "e-dani.com"
  # Renew 30 days before expiry
  renewBefore: 720h
---
# Dedicated certificate for the nested OpenClaw images host.
# Cloudflare Universal SSL only covers one wildcard level; this host is
# images.openclaw.e-dani.com, so it is served DNS-only by Traefik Edge.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: images-openclaw-tls
  namespace: traefik-edge
spec:
  secretName: images-openclaw-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "images.openclaw.e-dani.com"
  renewBefore: 720h
---
# Certificate for the Shopify Affiliate app's public domain (skirmshop.es).
# Cloudflare-proxied; origin must present a valid skirmshop.es cert for
# Cloudflare "Full (strict)" SSL. Issued via DNS-01 (skirmshop.es is in the
# same Cloudflare account; letsencrypt-prod has a skirmshop.es solver).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: affiliate-skirmshop-tls
  namespace: traefik-edge
spec:
  secretName: affiliate-skirmshop-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "affiliate.skirmshop.es"
    - "go.skirmshop.es"
  renewBefore: 720h
---
# Dedicated certificate for the Shopify tracking host.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: track-skirmshop-es-tls
  namespace: traefik-edge
spec:
  secretName: track-skirmshop-es-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "track.skirmshop.es"
  renewBefore: 720h
