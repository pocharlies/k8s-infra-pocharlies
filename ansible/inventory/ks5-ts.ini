# KS-5 over Tailscale — REQUIRED for ssh_tailscale_only and any post-hardening
# Ansible run: once public SSH is closed, the public-IP inventory (generated/ks5.ini)
# can no longer reach the nodes. Connect via the Tailscale IP instead.
[ks5-cp-1]
ks5-cp-1 ansible_host=100.107.21.89 tailscale_ipv4=100.107.21.89

[ks5-cp-2]
ks5-cp-2 ansible_host=100.71.117.127 tailscale_ipv4=100.71.117.127

[ks5-cp-3]
ks5-cp-3 ansible_host=100.75.189.75 tailscale_ipv4=100.75.189.75

[ks5_ts:children]
ks5-cp-1
ks5-cp-2
ks5-cp-3

[ks5_ts:vars]
ansible_user=ubuntu
