---
# Apply Longhorn storage-node prerequisites to all amd64 Ubuntu control-plane
# nodes (x86 + the 3 KS-5-A) so they are reproducible / reinstallable.
# Idempotent — safe to re-run. Run with:
#   ansible-playbook -i ansible/inventory/generated/ks5.ini ansible/playbooks/longhorn-prereqs.yml
- name: Longhorn prerequisites — KS-5-A control-plane storage nodes
  hosts: ks5_control_plane
  become: true
  gather_facts: true
  roles:
    - longhorn_prereqs

- name: Longhorn prerequisites — x86 control-plane (local execution)
  hosts: ubuntu
  connection: local
  become: true
  gather_facts: true
  roles:
    - longhorn_prereqs
