---
- name: Require SSH_PUBLIC_KEY
  ansible.builtin.assert:
    that:
      - lookup('env', 'SSH_PUBLIC_KEY') | length > 0
    fail_msg: "Set SSH_PUBLIC_KEY before hardening SSH access."
  no_log: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - openssh-server
      - ufw
      - jq
    state: present
    update_cache: true

- name: Add authorized SSH public key
  ansible.posix.authorized_key:
    user: ubuntu
    key: "{{ lookup('env', 'SSH_PUBLIC_KEY') }}"
    state: present
  no_log: true

- name: Harden SSH daemon
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-k8s-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      PubkeyAuthentication yes
      X11Forwarding no

- name: Reload SSH
  ansible.builtin.service:
    name: ssh
    state: reloaded

- name: Allow SSH on public interface during bootstrap
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow public Traefik ports
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
  loop: "{{ ssh_allowed_public_ports }}"

- name: Allow Kubernetes private ports from Tailscale
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    from_ip: 100.64.0.0/10
  loop: "{{ kubernetes_control_plane_ports }}"

- name: Allow all Tailscale private traffic
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
