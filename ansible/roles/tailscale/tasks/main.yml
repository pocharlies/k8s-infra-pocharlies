---
- name: Add Tailscale apt keyring
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      install -d -m 0755 /usr/share/keyrings
      curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg -o /usr/share/keyrings/tailscale-archive-keyring.gpg
      curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list -o /etc/apt/sources.list.d/tailscale.list
    creates: /etc/apt/sources.list.d/tailscale.list

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Start tailscaled
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true

- name: Check Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Build Tailscale up arguments
  ansible.builtin.set_fact:
    tailscale_up_args: >-
      {{
        [
          'tailscale',
          'up',
          '--auth-key=' ~ lookup('env', 'TAILSCALE_AUTH_KEY'),
          '--hostname=' ~ inventory_hostname,
          '--accept-dns=true',
          '--ssh'
        ]
        + (
          ['--advertise-tags=' ~ (lookup('env', 'TAILSCALE_TAGS') | default(tailscale_tags | join(','), true))]
          if lookup('env', 'TAILSCALE_SKIP_TAGS') != 'true'
          else []
        )
      }}
  no_log: true

- name: Join tailnet
  ansible.builtin.command:
    argv: "{{ tailscale_up_args }}"
  when: tailscale_status.rc != 0 or (tailscale_status.stdout | default('{}') | from_json).BackendState | default('') != 'Running'
  no_log: true

- name: Capture Tailscale IPv4
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Publish tailscale_ipv4 fact
  ansible.builtin.set_fact:
    tailscale_ipv4: "{{ tailscale_ip.stdout_lines[0] }}"
