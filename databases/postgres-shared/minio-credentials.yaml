# Credenciales S3 para que CNPG escriba backups en MinIO. Vault path:
#   secret/postgres-shared/minio
# Keys esperadas: access_key_id, secret_access_key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-shared-minio
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: backup-credentials
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-shared-minio
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: postgres-shared/minio
        property: access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: postgres-shared/minio
        property: secret_access_key
