---
# SkirmShop — Shopify apps + labels microservices
#
# Services in this namespace:
#   shared-postgres      — CloudNativePG cluster (stateful, Phase 9 — most critical)
#   shared-rabbitmq      — RabbitMQ (stateful, Phase 9)
#   skirmshop-picker     — Picqer picker integration (stateless)
#   bundles-app          — Shopify bundle builder (stateless)
#   sii-app              — SII/invoicing app (stateless)
#   labels stack:        — Shopify labels microservices
#     shopify-app, event-gateway, label-storage, routing-service,
#     saga-launcher, ups-adapter, synapse (api/correlator/operator)
#
# Stateful stores (shared-postgres, shared-rabbitmq, skirmshop-labels postgres/redis/nats)
# are created here but scale to 0 until Phase 9 data migration completes.

# ══════════════════════════════════════════════════════════════════════════════
# SHARED POSTGRES (CloudNativePG — PRIMARY migration target)
# ══════════════════════════════════════════════════════════════════════════════
# vault kv put secret/skirmshop/postgres \
#   superuser-username=postgres \
#   superuser-password=<random> \
#   app-username=skirmshop \
#   app-password=<random>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shared-postgres-superuser
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: shared-postgres-superuser
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef: { key: secret/skirmshop/postgres, property: superuser-username }
    - secretKey: password
      remoteRef: { key: secret/skirmshop/postgres, property: superuser-password }
---
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shared-postgres-app
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: shared-postgres-app
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef: { key: secret/skirmshop/postgres, property: app-username }
    - secretKey: password
      remoteRef: { key: secret/skirmshop/postgres, property: app-password }
---
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-postgres
  namespace: skirmshop
spec:
  instances: 1   # bump to 2 after initial migration validates; 3 for production HA
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    storageClass: longhorn
    size: 50Gi   # shared DB: skirmshop, skirmbooks, pocharlies
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      work_mem: "16MB"
  affinity:
    nodeSelector:
      kubernetes.io/hostname: ubuntu
  superuserSecret:
    name: shared-postgres-superuser
  bootstrap:
    # On fresh install: initdb. On restore from backup: use recovery block instead.
    initdb:
      database: skirmshop
      owner: skirmshop
      secret:
        name: shared-postgres-app
      postInitSQL:
        # Skirmshop ecosystem databases (all owned by skirmshop app user)
        - CREATE DATABASE bundles OWNER skirmshop;
        - CREATE DATABASE sii OWNER skirmshop;
        - CREATE DATABASE collections_tree OWNER skirmshop;
        - CREATE DATABASE affiliate OWNER skirmshop;
        - CREATE DATABASE translations OWNER skirmshop;
        - CREATE DATABASE firecrawl OWNER skirmshop;
        - CREATE DATABASE back_in_stock OWNER skirmshop;
        - CREATE DATABASE product_ai OWNER skirmshop;
        - CREATE DATABASE pocharlies OWNER skirmshop;
        - CREATE DATABASE skirmbooks OWNER skirmshop;
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/shared-postgres/
      endpointURL: http://minio-s3.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:  { name: minio-backup-creds, key: ACCESS_KEY_ID }
        secretAccessKey: { name: minio-backup-creds, key: SECRET_ACCESS_KEY }
      wal: { compression: gzip }
    retentionPolicy: "30d"
---
---
# Scheduled backup: daily at 01:00 UTC
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: shared-postgres-daily
  namespace: skirmshop
spec:
  schedule: "0 1 * * *"
  backupOwnerReference: self
  cluster: { name: shared-postgres }

# ══════════════════════════════════════════════════════════════════════════════
# SHARED RABBITMQ
# ══════════════════════════════════════════════════════════════════════════════
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-rabbitmq-data
  namespace: skirmshop
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 5Gi } }
  storageClassName: longhorn
---
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-secrets
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: rabbitmq-secrets
    creationPolicy: Owner
  data:
    - secretKey: RABBITMQ_DEFAULT_USER
      remoteRef: { key: secret/skirmshop/rabbitmq, property: user }
    - secretKey: RABBITMQ_DEFAULT_PASS
      remoteRef: { key: secret/skirmshop/rabbitmq, property: password }
---
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shared-rabbitmq
  namespace: skirmshop
spec:
  serviceName: shared-rabbitmq
  replicas: 1
  selector: { matchLabels: { app: shared-rabbitmq } }
  template:
    metadata: { labels: { app: shared-rabbitmq } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        topology: lan
        kubernetes.io/arch: amd64
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - { name: amqp, containerPort: 5672 }
            - { name: mgmt, containerPort: 15672 }
          envFrom:
            - secretRef: { name: rabbitmq-secrets }
          volumeMounts:
            - { name: data, mountPath: /var/lib/rabbitmq }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 1Gi }
          readinessProbe:
            exec: { command: [rabbitmq-diagnostics, check_port_connectivity] }
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: shared-rabbitmq-data }
---
---
apiVersion: v1
kind: Service
metadata:
  name: shared-rabbitmq
  namespace: skirmshop
spec:
  selector: { app: shared-rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: mgmt, port: 15672, targetPort: 15672 }
---
---
# Management UI (LAN only)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rabbitmq-mgmt
  namespace: skirmshop
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`rabbitmq.lan.e-dani.com`)
      kind: Rule
      services:
        - name: shared-rabbitmq
          port: 15672
      middlewares:
        - { name: authelia, namespace: authelia }
  tls:
    secretName: wildcard-lan-tls

# ══════════════════════════════════════════════════════════════════════════════
# SKIRMSHOP-LABELS STACK
# ══════════════════════════════════════════════════════════════════════════════
# Stateful deps for labels: postgres, redis, nats (separate from shared-postgres)
