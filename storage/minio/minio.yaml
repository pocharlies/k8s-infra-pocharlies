apiVersion: v1
kind: Namespace
metadata:
  name: minio
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-root
  namespace: minio
type: Opaque
stringData:
  # change root password later via Vault; placeholder for bootstrap
  root-user: dibanez
  root-password: "ChangeMe-MinIO-Bootstrap-2026!"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      # Pin to sauvage (edge HDD RAID, 2.6T free)
      nodeSelector:
        kubernetes.io/hostname: sauvage
      tolerations:
        - key: role
          operator: Equal
          value: edge
          effect: NoSchedule
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-password
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: public
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          hostPath:
            # Sauvage HDD RAID — large cold storage, slow but huge
            path: /srv/minio/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: minio-s3
  namespace: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: minio
spec:
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
