# NFS Subdir External Provisioner — StorageClass: nfs-cold
# NFS server: sauvage (10.99.0.2 via WireGuard), path: /srv/nfs/k8s-cold
# Helm chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
# Deploy as a separate Helm release named: nfs-provisioner-cold
nfs:
  server: 10.99.0.2
  path: /srv/nfs/k8s-cold
  mountOptions:
    - hard
    - nfsvers=4.1
    - rsize=1048576
    - wsize=1048576
    - timeo=900    # longer timeout over WireGuard (39ms RTT)
    - retrans=3

storageClass:
  name: nfs-cold
  defaultClass: false
  reclaimPolicy: Retain
  archiveOnDelete: true
  pathPattern: "${.PVC.namespace}/${.PVC.name}"

replicaCount: 1
# Pin to x86 master only — dgx/sauvage nodes can't reach sauvage NFS server
# (sauvage uses WireGuard; flannel overlay doesn't bridge LAN→WG for mounts)
nodeSelector:
  topology: lan
  kubernetes.io/arch: amd64
  kubernetes.io/hostname: ubuntu

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    memory: 128Mi
