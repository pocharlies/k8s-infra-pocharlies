# Vault Auto-Unseal Watcher
# Polls Vault every 30s; if sealed, applies the 3 stored unseal keys.
# Keys are stored in secret/vault-unseal-keys (key1, key2, key3).
# This is the homelab alternative to cloud KMS auto-unseal.
#
# SECURITY NOTE: the unseal keys are stored as a k8s Secret (encrypted
# at rest by etcd). Access is limited to the vault namespace via RBAC.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auto-unseal
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-auto-unseal
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-unseal-keys"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-auto-unseal
  namespace: vault
subjects:
  - kind: ServiceAccount
    name: vault-auto-unseal
    namespace: vault
roleRef:
  kind: Role
  name: vault-auto-unseal
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-auto-unseal
  namespace: vault
  labels:
    app: vault-auto-unseal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-auto-unseal
  template:
    metadata:
      labels:
        app: vault-auto-unseal
    spec:
      serviceAccountName: vault-auto-unseal
      nodeSelector:
        topology: lan
        kubernetes.io/arch: amd64
      containers:
        - name: unseal
          image: alpine/curl:latest
          command:
            - sh
            - -c
            - |
              set -e
              VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
              KEY1="${UNSEAL_KEY1}"
              KEY2="${UNSEAL_KEY2}"
              KEY3="${UNSEAL_KEY3}"

              echo "[auto-unseal] Starting Vault auto-unseal watcher..."

              while true; do
                STATUS=$(curl -sf "${VAULT_ADDR}/v1/sys/health" 2>/dev/null || echo '{"sealed":true}')
                SEALED=$(echo "$STATUS" | grep -o '"sealed":[a-z]*' | cut -d: -f2)

                if [ "$SEALED" = "true" ]; then
                  echo "[auto-unseal] Vault is sealed — applying unseal keys..."
                  curl -sf -X PUT "${VAULT_ADDR}/v1/sys/unseal" \
                    -H "Content-Type: application/json" \
                    -d "{\"key\":\"${KEY1}\"}" > /dev/null
                  curl -sf -X PUT "${VAULT_ADDR}/v1/sys/unseal" \
                    -H "Content-Type: application/json" \
                    -d "{\"key\":\"${KEY2}\"}" > /dev/null
                  RESULT=$(curl -sf -X PUT "${VAULT_ADDR}/v1/sys/unseal" \
                    -H "Content-Type: application/json" \
                    -d "{\"key\":\"${KEY3}\"}")
                  NEW_SEALED=$(echo "$RESULT" | grep -o '"sealed":[a-z]*' | cut -d: -f2)
                  if [ "$NEW_SEALED" = "false" ]; then
                    echo "[auto-unseal] Vault successfully unsealed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  else
                    echo "[auto-unseal] WARNING: still sealed after 3 keys: ${RESULT}"
                  fi
                fi

                sleep 30
              done
          env:
            - name: UNSEAL_KEY1
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key1
            - name: UNSEAL_KEY2
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key2
            - name: UNSEAL_KEY3
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key3
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
