# Vault — standalone Raft on Longhorn-backed PVC (single replica homelab)
global:
  enabled: true
  tlsDisable: true   # TLS via Traefik ingress later

injector:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64

server:
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  standalone:
    enabled: false   # using Raft mode instead

  ha:
    enabled: true
    replicas: 1
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/vault/data"
        }
        service_registration "kubernetes" {}

  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce

  serviceAccount:
    create: true

  ingress:
    enabled: false   # Traefik IngressRoute later

  logLevel: info
  logFormat: standard
