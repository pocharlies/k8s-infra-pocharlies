# ARC Runner Scale Set — arc-k8s (shared, organization scope)
# Helm chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
# Namespace: arc-runners
#
# Single shared runner for the whole pocharlies-org organization. All repos
# target it with `runner: arc-k8s` (callers of the reusable workflows in
# pocharlies-org/k8s-gitops-pocharlies). Org-scope runners are only available
# to repositories inside pocharlies-org.
#
# Auth: PAT (org scope) with repo+workflow in secret arc-github-pat-secret
# (arc-runners namespace):
#   kubectl create secret generic arc-github-pat-secret -n arc-runners \
#     --from-literal=github_token=<PAT>
#
# Image build jobs use Docker/container actions, so this scale set runs in dind
# mode. DinD is privileged; keep these runners isolated in arc-runners.

githubConfigUrl: https://github.com/pocharlies-org
githubConfigSecret: arc-github-pat-secret

controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

runnerScaleSetName: arc-k8s

minRunners: 0
maxRunners: 8

containerMode:
  type: dind

template:
  spec:
    nodeSelector:
      kubernetes.io/arch: amd64
      workload: cpu
    tolerations:
    - effect: NoSchedule
      key: role
      operator: Equal
      value: edge
