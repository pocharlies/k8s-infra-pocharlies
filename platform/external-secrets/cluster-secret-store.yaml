---
# ClusterSecretStore: connects External Secrets Operator to HashiCorp Vault
# Uses Kubernetes auth (ServiceAccount token) so no static credentials needed.
# Apply after Vault is unsealed and the auth method is configured:
#   vault auth enable kubernetes
#   vault write auth/kubernetes/config \
#     kubernetes_host="https://kubernetes.default.svc" \
#     kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
#   vault policy write eso-read - <<EOF
#     path "secret/data/*" { capabilities = ["read","list"] }
#   EOF
#   vault write auth/kubernetes/role/eso \
#     bound_service_account_names=external-secrets \
#     bound_service_account_namespaces=external-secrets \
#     policies=eso-read \
#     ttl=1h
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
