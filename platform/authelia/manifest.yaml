---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
data:
  configuration.yml: |
    theme: dark
    server:
      address: tcp://0.0.0.0:9091
    log:
      level: info
    totp:
      issuer: lan.e-dani.com
    authentication_backend:
      password_reset:
        disable: true
      file:
        path: /config/users_database.yml
        password:
          algorithm: argon2id
    access_control:
      default_policy: deny
      rules:
        - domain: "auth.lan.e-dani.com"
          policy: bypass
        - domain: "*.lan.e-dani.com"
          policy: one_factor
        - domain: "*.e-dani.com"
          policy: two_factor
    session:
      cookies:
        - name: authelia_session
          domain: lan.e-dani.com
          authelia_url: https://auth.lan.e-dani.com
          default_redirection_url: https://grafana.lan.e-dani.com
          expiration: 12h
          inactivity: 1h
          remember_me: 1M
    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 5m
    storage:
      local:
        path: /config/db.sqlite3
    notifier:
      disable_startup_check: true
      filesystem:
        filename: /config/notification.txt
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: authelia
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: authelia
spec:
  replicas: 1
  selector: { matchLabels: { app: authelia } }
  strategy: { type: Recreate }
  template:
    metadata: { labels: { app: authelia } }
    spec:
      enableServiceLinks: false   # avoid AUTHELIA_PORT_* env vars from k8s service discovery
      nodeSelector:
        topology: lan
        kubernetes.io/arch: amd64
      containers:
        - name: authelia
          image: authelia/authelia:4.39.5
          ports:
            - { containerPort: 9091, name: http }
          env:
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
              value: /secrets/jwt
            - name: AUTHELIA_SESSION_SECRET_FILE
              value: /secrets/session
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
              value: /secrets/storage-encryption
          volumeMounts:
            - { name: config, mountPath: /config/configuration.yml, subPath: configuration.yml }
            - { name: users,  mountPath: /config/users_database.yml, subPath: users_database.yml }
            - { name: data,   mountPath: /data }
            - { name: secrets, mountPath: /secrets, readOnly: true }
          # Authelia uses /config for sqlite + notification — share with data
          # but configuration is mounted readonly via subPath above
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: 9091 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 9091 }
            initialDelaySeconds: 30
      volumes:
        - { name: config, configMap: { name: authelia-config } }
        - { name: users,  secret: { secretName: authelia-users } }
        - { name: data,   persistentVolumeClaim: { claimName: authelia-data } }
        - { name: secrets, secret: { secretName: authelia-secrets } }
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: authelia
spec:
  selector: { app: authelia }
  ports:
    - { name: http, port: 80, targetPort: 9091 }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: authelia
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`auth.lan.e-dani.com`)
      kind: Rule
      services:
        - name: authelia
          port: 80
  tls:
    secretName: wildcard-lan-tls
---
# Middleware for other apps to use ForwardAuth
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: authelia
spec:
  forwardAuth:
    address: http://authelia.authelia.svc.cluster.local/api/authz/forward-auth
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Name
      - Remote-Email
      - Remote-Groups
