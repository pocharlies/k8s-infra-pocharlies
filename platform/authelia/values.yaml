# Authelia — file backend, single user, exposed via Traefik
domain: "lan.e-dani.com"

ingress:
  enabled: false   # use Traefik IngressRoute below

pod:
  kind: Deployment
  replicas: 1
  nodeSelector:
    topology: lan
    kubernetes.io/arch: amd64

configMap:
  enabled: true
  default_redirection_url: https://auth.lan.e-dani.com

  theme: dark

  authentication_backend:
    password_reset:
      disable: true
    file:
      enabled: true
      path: /config/users_database.yml

  access_control:
    default_policy: deny
    rules:
      - domain: "*.lan.e-dani.com"
        policy: one_factor
      - domain: "auth.lan.e-dani.com"
        policy: bypass

  session:
    name: authelia_session
    expiration: 12h
    inactivity: 1h
    remember_me_duration: 1M
    redis:
      enabled: true
      enabledSecret: false
      host: authelia-redis.authelia.svc.cluster.local
      port: 6379

  regulation:
    max_retries: 3
    find_time: 2m
    ban_time: 5m

  notifier:
    disable_startup_check: true
    filesystem:
      enabled: true
      filename: /data/notification.txt

  storage:
    local:
      enabled: true
      path: /data/db.sqlite3

  log:
    level: info

# Secrets — Authelia chart accepts these as auto-generated or provided values
secret:
  existingSecret: ""

certificates:
  values: []

persistence:
  enabled: true
  storageClass: longhorn
  size: 1Gi

# Redis side-car for session storage (alternative to running separate redis)
redis:
  # The authelia chart includes a small redis dep; we'll deploy ours
  enabled: false
