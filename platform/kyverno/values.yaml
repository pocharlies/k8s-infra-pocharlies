# Kyverno admission policies controller
# Helm chart: kyverno/kyverno
admissionController:
  replicas: 1
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

backgroundController:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

cleanupController:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

reportsController:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Grafana dashboard configmap for kyverno metrics
grafana:
  enabled: true
