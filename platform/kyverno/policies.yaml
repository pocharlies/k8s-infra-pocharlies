---
# POLICY 1: Block :latest tag in production namespaces
# Audit mode initially; switch to Enforce when builds are stable in Harbor
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/description: >
      Require containers to use explicit image tags.
      Using :latest makes rollbacks impossible and breaks GitOps.
spec:
  admission: true
  validationFailureAction: Audit   # TODO: switch to Enforce post-Phase-8
  background: true
  emitWarning: false
  rules:
    - name: require-image-tag
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - kube-public
                      - kube-node-lease
                      - longhorn-system
                      - velero
      validate:
        allowExistingViolations: true
        message: "Image tag ':latest' is not allowed. Use an explicit tag or digest."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
            =(initContainers):
              - image: "!*:latest"
            =(ephemeralContainers):
              - image: "!*:latest"
---
# POLICY 2: Restrict images to Harbor (homelab/cache projects) + trusted sources
# Audit mode until Harbor cache proxies are stable
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/description: >
      Images must come from Harbor (homelab, cache, library projects),
      trusted k8s system registries, or approved public registries.
spec:
  admission: true
  validationFailureAction: Audit   # TODO: Enforce after all builds pushed to Harbor
  background: true
  emitWarning: false
  rules:
    - name: validate-registries
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - kube-public
                      - kube-node-lease
      validate:
        allowExistingViolations: true
        message: >
          Images must use harbor.e-dani.com, harbor.lan.e-dani.com,
          registry.k8s.io, gcr.io/k8s-staging-*,
          quay.io, ghcr.io, docker.io/library, or nvcr.io/nvidia.
          Build and push to harbor.e-dani.com/homelab/ for private images.
        deny:
          conditions:
            all:
              - key: "{{ images.containers.*.registry[] }}"
                operator: AnyNotIn
                value:
                  - harbor.e-dani.com
                  - harbor.lan.e-dani.com
                  - registry.k8s.io
                  - gcr.io
                  - quay.io
                  - ghcr.io
                  - docker.io
                  - nvcr.io
                  - ""   # relative images (local)
---
# POLICY 3: Require resource requests and limits on all containers
# Prevents unbounded pods from starving other workloads
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
    - name: require-memory-limit
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - kube-public
                      - kube-node-lease
                      - longhorn-system
      validate:
        allowExistingViolations: true
        message: "All containers must set resources.limits.memory."
        pattern:
          spec:
            containers:
              - name: "*"
                resources:
                  limits:
                    memory: "?*"
---
# POLICY 4: Disallow privileged containers in production namespaces
# System namespaces are excluded (GPU operator, Longhorn need privilege)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
    - name: no-privileged
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - kube-public
                      - kube-node-lease
                      - longhorn-system
                      - gpu-operator
                      - nvidia-gpu-operator
      validate:
        allowExistingViolations: true
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): false
---
# POLICY 5: Label Kubernetes Services by infrastructure tier
# Used by observability dashboards via kube-state-metrics' kube_service_labels.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: label-services-infra-tier
  annotations:
    policies.kyverno.io/title: Label Services By Infrastructure Tier
    policies.kyverno.io/description: >
      Adds infra=true to platform Services and infra=false to application
      Services so dashboards can group cluster services consistently.
spec:
  admission: true
  background: true
  emitWarning: false
  rules:
    - name: label-infra-services
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds: [Service]
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - adguard
                      - arc-runners
                      - arc-systems
                      - argocd
                      - cert-manager
                      - cnpg-system
                      - databases
                      - default
                      - external-dns
                      - external-secrets-operator
                      - fleet-telemetry
                      - gpu-operator
                      - harbor
                      - kube-node-lease
                      - kube-public
                      - kube-system
                      - kyverno
                      - local-path-storage
                      - longhorn-system
                      - metallb-system
                      - minio
                      - monitoring
                      - nfs-provisioner
                      - traefik-edge
                      - traefik-lan
                      - vault
                      - velero
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              infra: "true"
    - name: label-application-services
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds: [Service]
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - adguard
                      - arc-runners
                      - arc-systems
                      - argocd
                      - cert-manager
                      - cnpg-system
                      - databases
                      - default
                      - external-dns
                      - external-secrets-operator
                      - fleet-telemetry
                      - gpu-operator
                      - harbor
                      - kube-node-lease
                      - kube-public
                      - kube-system
                      - kyverno
                      - local-path-storage
                      - longhorn-system
                      - metallb-system
                      - minio
                      - monitoring
                      - nfs-provisioner
                      - traefik-edge
                      - traefik-lan
                      - vault
                      - velero
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              infra: "false"
