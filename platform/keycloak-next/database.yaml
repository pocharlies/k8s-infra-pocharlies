apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-postgres-app
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/component: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-postgres-app
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: secret/keycloak-next/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: secret/keycloak-next/postgres
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-postgres-minio
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/component: backup-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-postgres-minio
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: postgres-shared/minio
        property: access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: postgres-shared/minio
        property: secret_access_key
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-postgres
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/component: database
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-postgres-app

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      work_mem: "8MB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      log_statement: "ddl"
      log_min_duration_statement: "1000"

  storage:
    storageClass: longhorn
    size: 20Gi

  walStorage:
    storageClass: longhorn
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  monitoring:
    enablePodMonitor: false

  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/keycloak-next
      endpointURL: http://minio-s3.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: keycloak-postgres-minio
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: keycloak-postgres-minio
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2

  affinity:
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      kubernetes.io/arch: amd64
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: keycloak-postgres-daily
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/component: backup-schedule
spec:
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: keycloak-postgres
  immediate: true
