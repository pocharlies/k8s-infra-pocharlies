apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: forward-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: secret/keycloak-next/oauth2-proxy
        property: client_id
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: secret/keycloak-next/oauth2-proxy
        property: client_secret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: secret/keycloak-next/oauth2-proxy
        property: cookie_secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: forward-auth
data:
  oauth2_proxy.cfg: |
    provider = "keycloak-oidc"
    provider_display_name = "Keycloak"
    oidc_issuer_url = "https://auth-next.e-dani.com/realms/edani"
    skip_oidc_discovery = true
    login_url = "https://auth-next.e-dani.com/realms/edani/protocol/openid-connect/auth"
    redeem_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/token"
    profile_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/userinfo"
    validate_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/userinfo"
    oidc_jwks_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/certs"
    redirect_url = "https://auth-next.e-dani.com/oauth2/callback"
    scope = "openid email profile"

    reverse_proxy = true
    http_address = "0.0.0.0:4180"
    upstreams = [ "static://202" ]

    cookie_name = "_edani_sso"
    cookie_domains = [ ".e-dani.com" ]
    cookie_secure = true
    cookie_samesite = "lax"
    cookie_expire = "12h"
    cookie_refresh = "1h"

    whitelist_domains = [ ".e-dani.com" ]
    email_domains = [ "*" ]
    allowed_groups = [ "/edani-admins", "/edani-operators" ]

    pass_access_token = true
    pass_user_headers = true
    set_authorization_header = true
    set_xauthrequest = true
    skip_provider_button = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: forward-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          args: ["--config=/etc/oauth2-proxy/oauth2_proxy.cfg"]
          envFrom:
            - secretRef:
                name: oauth2-proxy-secrets
          ports:
            - { name: http, containerPort: 4180 }
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy/oauth2_proxy.cfg
              subPath: oauth2_proxy.cfg
              readOnly: true
          readinessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: forward-auth
spec:
  selector:
    app: oauth2-proxy
  ports:
    - { name: http, port: 4180, targetPort: http }
